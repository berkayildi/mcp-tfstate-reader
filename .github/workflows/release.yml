name: Release and Publish

on:
  push:
    branches:
      - main

# Minimal top-level permissions — each job declares only what it needs.
permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create GitHub release + tag
      pull-requests: write  # open/update the release PR
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-to-pypi:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for PyPI Trusted Publishers (OIDC)
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/project/mcp-tfstate-reader/
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build the package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
